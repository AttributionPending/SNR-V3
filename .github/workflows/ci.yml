name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - name: Install dependencies
        run: npm ci --legacy-peer-deps
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint (advisory — pre-existing debt; does not block)
        run: npx eslint . || true
        continue-on-error: true
      - name: Build frontend
        run: npm run build
      - name: Docker build (smoke)
        run: docker build -t snr:ci .
